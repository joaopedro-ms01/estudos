</head>
<body>
    <h1>Parágrafos e quebra de linha</h1>
    <hr>
    <p>Você pode escrever

    <!--Comentarios em HTML-->
    <p>Simbolos especais:
        &reg;
        &copy;
        &trade;
        &euro;
        &dollar;
        &real;
        &uparrow;
        
    </p>
