<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midia HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotoP.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/fotoM.png" type="image/png">
        <img src="imagens/fotoG.png" alt="Imagem Dinâmica">
    </picture>

    <h1>Reproduzindo Audio</h1>
    <audio controls >
        <source src="midia/BATERIA ACABOU - Rey Vaqueiro.mp3" type="audio/mpeg">
    </audio>


</body>
</html>
